<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athleaders SEO Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ======================================================
   ATHLEADERS SEO DASHBOARD - CONFIGURATION
   Replace the ID below with your Google Spreadsheet ID
   ====================================================== */

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0D0D0F;--surface:#18181B;--surface2:#1E1E22;--surface3:#27272A;
  --pink:#FF2F8A;--pink-soft:#FF6BAE;--pink-glow:rgba(255,47,138,.12);
  --green:#22C55E;--green-soft:#4ADE80;--yellow:#EAB308;--orange:#F97316;--red:#EF4444;
  --white:#FAFAFA;--muted:#71717A;--dimmed:#52525B;
  --font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:10px;
}
body{font-family:var(--font);background:var(--bg);color:var(--white);min-height:100vh}
::selection{background:var(--pink);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid rgba(255,255,255,.04);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;transition:transform .3s}
.sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.04)}
.sidebar-brand h1{font-size:13px;letter-spacing:3px;color:var(--pink);font-weight:700}
.sidebar-brand p{font-size:11px;color:var(--muted);margin-top:4px;font-weight:400}
.nav-group{padding:12px 0}
.nav-group-label{padding:6px 20px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dimmed);font-weight:600}
.nav-item{padding:9px 20px 9px 24px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;border-left:2px solid transparent;font-weight:500}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,.02)}
.nav-item.active{color:var(--pink);background:var(--pink-glow);border-left-color:var(--pink)}

.main{margin-left:240px;flex:1;padding:20px 28px;min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.04)}
.topbar h2{font-size:18px;font-weight:600}
.topbar-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted)}
.topbar-meta .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border-radius:var(--radius);padding:16px 18px;border-left:3px solid var(--pink);transition:transform .15s}
.kpi:hover{transform:translateY(-1px)}
.kpi .val{font-size:26px;font-weight:700;font-family:var(--mono);margin-bottom:2px}
.kpi .label{font-size:11px;color:var(--muted);font-weight:500}
.kpi .delta{font-size:11px;margin-top:4px;font-weight:600}
.kpi .delta.up{color:var(--green)}.kpi .delta.down{color:var(--red)}.kpi .delta.flat{color:var(--muted)}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.chart-card{background:var(--surface);border-radius:var(--radius);padding:18px}
.chart-card h3{font-size:13px;margin-bottom:12px;color:var(--muted);font-weight:600}
.chart-card canvas{max-height:280px}
.chart-full{grid-column:1/-1}

/* Tables */
.table-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.table-card h3{padding:14px 18px 10px;font-size:13px;font-weight:600;color:var(--muted)}
.table-toolbar{padding:0 18px 10px;display:flex;gap:10px;flex-wrap:wrap}
.table-toolbar input,.table-toolbar select{background:var(--bg);border:1px solid var(--surface3);color:var(--white);padding:6px 12px;border-radius:6px;font-size:12px;font-family:var(--font)}
.table-toolbar input:focus,.table-toolbar select:focus{outline:none;border-color:var(--pink)}
.scroll-table{max-height:560px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg);color:var(--pink);padding:8px 10px;text-align:left;position:sticky;top:0;font-weight:600;font-size:11px;letter-spacing:.3px;white-space:nowrap}
tbody tr{transition:background .1s}
tbody tr:nth-child(even){background:var(--surface2)}
tbody tr:hover{background:var(--pink-glow)}
tbody td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.02)}

/* Position badges */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-weight:600;font-size:11px;min-width:32px;text-align:center;font-family:var(--mono)}
.badge-1{background:var(--green);color:#fff}
.badge-2{background:var(--green-soft);color:#000}
.badge-3{background:var(--yellow);color:#000}
.badge-4{background:var(--orange);color:#fff}
.badge-5{background:var(--red);color:#fff}
.badge-na{background:var(--surface3);color:var(--muted)}

/* Volume badge */
.vol{font-family:var(--mono);font-weight:600;font-size:11px}
.vol-high{color:var(--green)}.vol-med{color:var(--yellow)}.vol-low{color:var(--muted)}.vol-zero{color:var(--dimmed)}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.loading .spinner{width:36px;height:36px;border:3px solid var(--surface3);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:13px}

/* Responsive */
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:200;background:var(--surface);border:none;color:var(--white);font-size:22px;padding:8px 12px;border-radius:8px;cursor:pointer}
@media(max-width:768px){
  .hamburger{display:block}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:14px}
  .chart-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
@media print{
  .sidebar,.hamburger,.table-toolbar,.topbar-meta{display:none!important}
  .main{margin-left:0}
  body{background:#fff;color:#000}
  .kpi,.chart-card,.table-card{border:1px solid #ddd;background:#fff}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ============================================================
// CONFIGURATION - Replace with your Google Sheet ID
// ============================================================
const SHEET_ID = '1WyocQSNMthgpwkPY4GXHTNJfe7upupOWMUYgfXhEaTI';

function sheetUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

// ============================================================
// DATA FETCHING
// ============================================================
async function fetchCSV(sheetName) {
  const res = await fetch(sheetUrl(sheetName));
  const text = await res.text();
  return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
}

function parseRankings(rows) {
  if (!rows.length) return { dates: [], keywords: [] };
  const allCols = Object.keys(rows[0]);
  const dates = allCols.filter(c => c !== 'Keyword' && c !== 'Volume');
  const keywords = rows
    .filter(r => r.Keyword && r.Keyword.trim() && r.Keyword.toLowerCase() !== 'additional keywords')
    .map(r => ({
      keyword: r.Keyword.trim(),
      volume: parseInt(r.Volume) || 0,
      positions: dates.map(d => {
        const v = r[d];
        if (v === '' || v === null || v === undefined) return null;
        const n = parseInt(v);
        return isNaN(n) ? null : n;
      })
    }));
  return { dates, keywords };
}

function parseBacklinks(rows) {
  const months = {};
  rows.forEach(r => {
    const m = r.Month;
    if (!m) return;
    if (!months[m]) months[m] = { month: m, activities: {}, totalBacklinks: 0 };
    const act = r.Activity;
    if (!act) return;
    months[m].activities[act] = {
      w1: parseInt(r['Week 1']) || 0,
      w2: parseInt(r['Week 2']) || 0,
      w3: parseInt(r['Week 3']) || 0,
      w4: parseInt(r['Week 4']) || 0,
      total: parseInt(r.Total) || 0
    };
  });
  Object.values(months).forEach(m => {
    m.totalBacklinks = Object.values(m.activities).reduce((s, a) => s + a.total, 0);
  });
  return Object.values(months);
}

// ============================================================
// UTILITY COMPONENTS
// ============================================================
function badgeClass(p) {
  if (p === null) return 'badge-na';
  if (p <= 3) return 'badge-1';
  if (p <= 10) return 'badge-2';
  if (p <= 20) return 'badge-3';
  if (p <= 50) return 'badge-4';
  return 'badge-5';
}

function Badge({ pos }) {
  return <span className={`badge ${badgeClass(pos)}`}>{pos === null ? 'NA' : pos}</span>;
}

function VolBadge({ vol }) {
  const cls = vol >= 1000 ? 'vol-high' : vol >= 100 ? 'vol-med' : vol > 0 ? 'vol-low' : 'vol-zero';
  return <span className={`vol ${cls}`}>{vol > 0 ? vol.toLocaleString() : '-'}</span>;
}

function Delta({ curr, prev }) {
  if (curr === null && prev === null) return <span className="delta flat">-</span>;
  if (curr === null) return <span className="delta down">Lost</span>;
  if (prev === null) return <span className="delta up">New</span>;
  const diff = prev - curr;
  if (diff > 0) return <span className="delta up">+{diff}</span>;
  if (diff < 0) return <span className="delta down">{diff}</span>;
  return <span className="delta flat">=</span>;
}

function countTop(kws, idx, max) {
  return kws.filter(k => k.positions[idx] !== null && k.positions[idx] <= max).length;
}
function avgPos(kws, idx) {
  const v = kws.map(k => k.positions[idx]).filter(p => p !== null);
  return v.length ? (v.reduce((a,b) => a+b, 0) / v.length).toFixed(1) : 'N/A';
}

// ============================================================
// CHART WRAPPER
// ============================================================
function ChartCanvas({ id, config, className }) {
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);
  React.useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    Chart.defaults.color = '#71717A';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
    chartRef.current = new Chart(ctx, config);
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(config)]);
  return <canvas ref={ref} className={className}></canvas>;
}

// ============================================================
// PAGE: EXECUTIVE SUMMARY
// ============================================================
function Executive({ ae, co, aeBL, coBL }) {
  const aeTop10 = countTop(ae.keywords, 0, 10);
  const coTop10 = countTop(co.keywords, 0, 10);
  const aeTop10Prev = countTop(ae.keywords, 1, 10);
  const coTop10Prev = countTop(co.keywords, 1, 10);
  const aeTotalVol = ae.keywords.reduce((s,k) => s + k.volume, 0);
  const coTotalVol = co.keywords.reduce((s,k) => s + k.volume, 0);
  const aeBLTotal = aeBL.length ? aeBL[0].totalBacklinks : 0;
  const coBLTotal = coBL.length ? coBL[0].totalBacklinks : 0;

  const top10Config = (data, label) => {
    const dates = [...data.dates].reverse();
    const counts = dates.map((_, i) => countTop(data.keywords, data.dates.length - 1 - i, 10));
    return {
      type: 'line',
      data: { labels: dates, datasets: [{ label, data: counts, borderColor: '#FF2F8A', backgroundColor: 'rgba(255,47,138,0.08)', fill: true, tension: 0.35, pointRadius: 1.5 }] },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 10, font: { size: 10 } } }, y: { beginAtZero: true } } }
    };
  };

  return (<div>
    <div className="kpi-grid">
      <div className="kpi"><div className="val">{ae.keywords.length + co.keywords.length}</div><div className="label">Total Keywords</div><div className="delta flat">{ae.keywords.length} (.ae) + {co.keywords.length} (.co)</div></div>
      <div className="kpi"><div className="val">{aeTop10}</div><div className="label">Top 10 (.ae)</div><Delta curr={aeTop10} prev={aeTop10Prev}/></div>
      <div className="kpi"><div className="val">{coTop10}</div><div className="label">Top 10 (.co)</div><Delta curr={coTop10} prev={coTop10Prev}/></div>
      <div className="kpi"><div className="val">{(aeTotalVol + coTotalVol).toLocaleString()}</div><div className="label">Total Search Volume</div></div>
      <div className="kpi"><div className="val">{aeBLTotal + coBLTotal}</div><div className="label">Backlinks (Latest Month)</div><div className="delta flat">{aeBLTotal} (.ae) + {coBLTotal} (.co)</div></div>
    </div>
    <div className="chart-grid">
      <div className="chart-card"><h3>athleaders.ae - Keywords in Top 10</h3><ChartCanvas id="exec-ae" config={top10Config(ae, '.ae')}/></div>
      <div className="chart-card"><h3>athleaders.co - Keywords in Top 10</h3><ChartCanvas id="exec-co" config={top10Config(co, '.co')}/></div>
    </div>
    <Movers title="Top Movers - athleaders.ae" data={ae}/>
    <Movers title="Top Movers - athleaders.co" data={co}/>
  </div>);
}

function Movers({ title, data }) {
  const movers = data.keywords.map(k => {
    const c = k.positions[0], p = k.positions[1];
    let change = null;
    if (c !== null && p !== null) change = p - c;
    else if (c !== null && p === null) change = 100;
    else if (c === null && p !== null) change = -100;
    return { keyword: k.keyword, curr: c, prev: p, change, volume: k.volume };
  }).filter(m => m.change !== null);
  movers.sort((a,b) => b.change - a.change);
  const top5 = movers.slice(0, 5);
  const bottom5 = movers.filter(m => m.change < 0).sort((a,b) => a.change - b.change).slice(0, 5);

  return (<div className="table-card">
    <h3>{title}</h3>
    <div className="scroll-table" style={{maxHeight:'320px'}}>
      <table>
        <thead><tr><th>Keyword</th><th>Vol.</th><th>Before</th><th></th><th>After</th><th>Change</th></tr></thead>
        <tbody>
          {top5.map((m,i) => <tr key={'up'+i}><td style={{fontWeight:500}}>{m.keyword}</td><td><VolBadge vol={m.volume}/></td><td><Badge pos={m.prev}/></td><td style={{color:'var(--muted)'}}>&#8594;</td><td><Badge pos={m.curr}/></td><td className="delta up">+{m.change === 100 ? 'New' : m.change}</td></tr>)}
          {bottom5.length > 0 && <tr><td colSpan="6" style={{padding:'8px 10px',color:'var(--dimmed)',fontSize:'10px',letterSpacing:'1px'}}>DECLINES</td></tr>}
          {bottom5.map((m,i) => <tr key={'dn'+i}><td style={{fontWeight:500}}>{m.keyword}</td><td><VolBadge vol={m.volume}/></td><td><Badge pos={m.prev}/></td><td style={{color:'var(--muted)'}}>&#8594;</td><td><Badge pos={m.curr}/></td><td className="delta down">{m.change === -100 ? 'Lost' : m.change}</td></tr>)}
        </tbody>
      </table>
    </div>
  </div>);
}

// ============================================================
// PAGE: RANKING OVERVIEW
// ============================================================
function RankingOverview({ data, domain }) {
  const kws = data.keywords;
  const top3 = countTop(kws, 0, 3);
  const top10 = countTop(kws, 0, 10);
  const top30 = countTop(kws, 0, 30);
  const naCount = kws.filter(k => k.positions[0] === null).length;
  const avg = avgPos(kws, 0);
  const totalVol = kws.reduce((s,k) => s + k.volume, 0);
  const rankedVol = kws.filter(k => k.positions[0] !== null && k.positions[0] <= 10).reduce((s,k) => s + k.volume, 0);

  const distConfig = () => {
    const last4 = data.dates.slice(0, 4);
    const dd = last4.map((d, di) => ({
      t3: countTop(kws, di, 3),
      t10: countTop(kws, di, 10) - countTop(kws, di, 3),
      t30: countTop(kws, di, 30) - countTop(kws, di, 10),
      t100: countTop(kws, di, 100) - countTop(kws, di, 30),
      na: kws.filter(k => k.positions[di] === null).length
    }));
    return {
      type: 'bar',
      data: { labels: last4, datasets: [
        { label: 'Top 3', data: dd.map(d=>d.t3), backgroundColor: '#22C55E' },
        { label: '4-10', data: dd.map(d=>d.t10), backgroundColor: '#4ADE80' },
        { label: '11-30', data: dd.map(d=>d.t30), backgroundColor: '#EAB308' },
        { label: '31-100', data: dd.map(d=>d.t100), backgroundColor: '#F97316' },
        { label: 'N/A', data: dd.map(d=>d.na), backgroundColor: '#3F3F46' }
      ]},
      options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
    };
  };

  const volKws = kws.filter(k => k.volume > 0).slice(0, 20);

  return (<div>
    <p style={{fontSize:'12px',color:'var(--muted)',marginBottom:'16px'}}>{domain}</p>
    <div className="kpi-grid">
      <div className="kpi"><div className="val">{kws.length}</div><div className="label">Total Keywords</div></div>
      <div className="kpi"><div className="val">{top3}</div><div className="label">Top 3</div></div>
      <div className="kpi"><div className="val">{top10}</div><div className="label">Top 10</div></div>
      <div className="kpi"><div className="val">{top30}</div><div className="label">Top 30</div></div>
      <div className="kpi"><div className="val">{naCount}</div><div className="label">Not Ranking</div></div>
      <div className="kpi"><div className="val">{avg}</div><div className="label">Avg Position</div></div>
      <div className="kpi"><div className="val">{totalVol.toLocaleString()}</div><div className="label">Total Volume</div></div>
      <div className="kpi"><div className="val">{rankedVol.toLocaleString()}</div><div className="label">Top 10 Volume</div></div>
    </div>
    <div className="chart-grid">
      <div className="chart-card"><h3>Position Distribution</h3><ChartCanvas id={domain+'-dist'} config={distConfig()}/></div>
      <div className="chart-card"><h3>Top Keywords by Volume</h3>
        <div className="scroll-table" style={{maxHeight:'260px'}}>
          <table><thead><tr><th>#</th><th>Keyword</th><th>Vol.</th><th>Rank</th><th>Change</th></tr></thead>
            <tbody>{volKws.map((k,i) => <tr key={i}><td>{i+1}</td><td style={{fontWeight:500}}>{k.keyword}</td><td><VolBadge vol={k.volume}/></td><td><Badge pos={k.positions[0]}/></td><td><Delta curr={k.positions[0]} prev={k.positions[1]}/></td></tr>)}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>);
}

// ============================================================
// PAGE: DETAILED RANKINGS
// ============================================================
function DetailedRankings({ data, domain }) {
  const [search, setSearch] = React.useState('');
  const [bucket, setBucket] = React.useState('');
  const dates = data.dates.slice(0, 8);

  const filtered = data.keywords.filter(k => {
    if (search && !k.keyword.toLowerCase().includes(search.toLowerCase())) return false;
    const p = k.positions[0];
    if (bucket === '1-3' && (p === null || p > 3)) return false;
    if (bucket === '1-10' && (p === null || p > 10)) return false;
    if (bucket === '11-20' && (p === null || p < 11 || p > 20)) return false;
    if (bucket === '21-50' && (p === null || p < 21 || p > 50)) return false;
    if (bucket === '51+' && (p === null || p < 51)) return false;
    if (bucket === 'na' && p !== null) return false;
    return true;
  });

  return (<div>
    <p style={{fontSize:'12px',color:'var(--muted)',marginBottom:'16px'}}>{domain} - All Keywords (sorted by search volume)</p>
    <div className="table-card">
      <div className="table-toolbar">
        <input placeholder="Search keywords..." value={search} onChange={e => setSearch(e.target.value)}/>
        <select value={bucket} onChange={e => setBucket(e.target.value)}>
          <option value="">All Positions</option>
          <option value="1-3">Top 3</option>
          <option value="1-10">Top 10</option>
          <option value="11-20">11-20</option>
          <option value="21-50">21-50</option>
          <option value="51+">51+</option>
          <option value="na">Not Ranking</option>
        </select>
        <span style={{color:'var(--muted)',fontSize:'12px',marginLeft:'8px'}}>{filtered.length} keywords</span>
      </div>
      <div className="scroll-table">
        <table>
          <thead><tr>
            <th>#</th><th>Keyword</th><th style={{color:'var(--yellow)'}}>Vol.</th>
            {dates.map(d => <th key={d}>{d}</th>)}
            <th>Best</th>
          </tr></thead>
          <tbody>
            {filtered.map((k, i) => {
              const best = k.positions.filter(p => p !== null);
              const bestPos = best.length ? Math.min(...best) : null;
              return (<tr key={i}>
                <td>{i+1}</td>
                <td style={{fontWeight:500,maxWidth:'240px'}}>{k.keyword}</td>
                <td><VolBadge vol={k.volume}/></td>
                {dates.map((d, di) => <td key={d}>
                  <Badge pos={k.positions[di]}/>
                  {di === 0 && <span style={{marginLeft:'4px'}}><Delta curr={k.positions[0]} prev={k.positions[1]}/></span>}
                </td>)}
                <td><Badge pos={bestPos}/></td>
              </tr>);
            })}
          </tbody>
        </table>
      </div>
    </div>
  </div>);
}

// ============================================================
// PAGE: BACKLINKS
// ============================================================
function Backlinks({ months, domain }) {
  if (!months.length) return <p style={{color:'var(--muted)'}}> No backlink data available.</p>;
  const latest = months[0];
  const prev = months[1];

  const trendConfig = {
    type: 'bar',
    data: {
      labels: [...months].reverse().map(m => m.month),
      datasets: [{ label: 'Total Backlinks', data: [...months].reverse().map(m => m.totalBacklinks), backgroundColor: '#FF2F8A', borderRadius: 4 }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  };

  const acts = Object.keys(latest.activities);
  const pieConfig = {
    type: 'doughnut',
    data: {
      labels: acts,
      datasets: [{ data: acts.map(a => latest.activities[a].total), backgroundColor: ['#FF2F8A','#FF6BAE','#22C55E','#3B82F6','#EAB308','#EF4444','#8B5CF6','#06B6D4','#F97316','#4ADE80','#EC4899','#14B8A6','#A855F7','#FB923C','#6366F1'] }]
    },
    options: { responsive: true, plugins: { legend: { position: 'right', labels: { font: { size: 10 }, color: '#71717A' } } } }
  };

  return (<div>
    <p style={{fontSize:'12px',color:'var(--muted)',marginBottom:'16px'}}>{domain}</p>
    <div className="kpi-grid">
      <div className="kpi"><div className="val">{latest.totalBacklinks}</div><div className="label">{latest.month} Total</div></div>
      {prev && <div className="kpi"><div className="val">{prev.totalBacklinks}</div><div className="label">{prev.month} Total</div></div>}
    </div>
    <div className="chart-grid">
      <div className="chart-card"><h3>Monthly Backlink Volume</h3><ChartCanvas id={domain+'-bl-trend'} config={trendConfig}/></div>
      <div className="chart-card"><h3>Activity Mix - {latest.month}</h3><ChartCanvas id={domain+'-bl-pie'} config={pieConfig}/></div>
    </div>
    <div className="table-card">
      <h3>Backlink Breakdown</h3>
      <div className="scroll-table">
        <table>
          <thead><tr><th>Activity</th><th>W1</th><th>W2</th><th>W3</th><th>W4</th><th>Total</th>{prev && <th>{prev.month}</th>}</tr></thead>
          <tbody>
            {acts.map(a => {
              const curr = latest.activities[a];
              const prevA = prev?.activities[a];
              return <tr key={a}><td style={{fontWeight:500}}>{a}</td><td>{curr.w1}</td><td>{curr.w2}</td><td>{curr.w3}</td><td>{curr.w4}</td><td style={{fontWeight:600}}>{curr.total}</td>{prev && <td>{prevA?.total || 0}</td>}</tr>;
            })}
            <tr style={{fontWeight:700,borderTop:'2px solid rgba(255,255,255,.08)'}}>
              <td>Total</td><td></td><td></td><td></td><td></td><td>{latest.totalBacklinks}</td>{prev && <td>{prev.totalBacklinks}</td>}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>);
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [page, setPage] = React.useState('executive');
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const [sidebarOpen, setSidebarOpen] = React.useState(false);

  React.useEffect(() => {
    async function load() {
      try {
        const [aeRows, coRows, aeBLRows, coBLRows] = await Promise.all([
          fetchCSV('AE Rankings'),
          fetchCSV('CO Rankings'),
          fetchCSV('AE Backlinks'),
          fetchCSV('CO Backlinks')
        ]);
        setData({
          ae: parseRankings(aeRows),
          co: parseRankings(coRows),
          aeBL: parseBacklinks(aeBLRows),
          coBL: parseBacklinks(coBLRows)
        });
      } catch (err) {
        console.error(err);
        setError('Could not load data from Google Sheets. Check that the Sheet ID is correct and the sheet is published to the web.');
      }
      setLoading(false);
    }
    load();
  }, []);

  const nav = (p) => { setPage(p); setSidebarOpen(false); };
  const lastUpdated = data?.ae?.dates?.[0] || data?.co?.dates?.[0] || '-';

  const pages = {
    executive: { label: 'Executive Summary', render: () => <Executive ae={data.ae} co={data.co} aeBL={data.aeBL} coBL={data.coBL}/> },
    'ae-overview': { label: 'Ranking Overview', group: 'athleaders.ae', render: () => <RankingOverview data={data.ae} domain="athleaders.ae"/> },
    'ae-detailed': { label: 'Detailed Rankings', group: 'athleaders.ae', render: () => <DetailedRankings data={data.ae} domain="athleaders.ae"/> },
    'ae-backlinks': { label: 'Backlinks', group: 'athleaders.ae', render: () => <Backlinks months={data.aeBL} domain="athleaders.ae"/> },
    'co-overview': { label: 'Ranking Overview', group: 'athleaders.co', render: () => <RankingOverview data={data.co} domain="athleaders.co"/> },
    'co-detailed': { label: 'Detailed Rankings', group: 'athleaders.co', render: () => <DetailedRankings data={data.co} domain="athleaders.co"/> },
    'co-backlinks': { label: 'Backlinks', group: 'athleaders.co', render: () => <Backlinks months={data.coBL} domain="athleaders.co"/> },
  };

  const groups = {};
  Object.entries(pages).forEach(([id, p]) => {
    const g = p.group || '_top';
    if (!groups[g]) groups[g] = [];
    groups[g].push({ id, ...p });
  });

  return (<div className="app">
    <button className="hamburger" onClick={() => setSidebarOpen(!sidebarOpen)}>&#9776;</button>
    <nav className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
      <div className="sidebar-brand">
        <h1>ATHLEADERS</h1>
        <p>SEO Performance Dashboard</p>
      </div>
      {Object.entries(groups).map(([group, items]) => (
        <div className="nav-group" key={group}>
          {group !== '_top' && <div className="nav-group-label">{group}</div>}
          {items.map(item => (
            <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => nav(item.id)}>{item.label}</div>
          ))}
        </div>
      ))}
    </nav>
    <div className="main">
      <div className="topbar">
        <h2>{pages[page]?.label || 'Dashboard'}</h2>
        <div className="topbar-meta">
          <span><span className="live-dot"></span> Live from Google Sheets</span>
          <span>Updated: {lastUpdated}</span>
        </div>
      </div>
      {loading && <div className="loading"><div className="spinner"></div><p>Loading data from Google Sheets...</p></div>}
      {error && <div className="loading"><p style={{color:'var(--red)'}}>{error}</p><p style={{fontSize:'11px',color:'var(--muted)',maxWidth:'400px',textAlign:'center'}}>Make sure you replaced YOUR_GOOGLE_SHEET_ID_HERE with your actual Spreadsheet ID, and that the sheet is published to the web (File &gt; Share &gt; Publish to web).</p></div>}
      {data && pages[page]?.render()}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
